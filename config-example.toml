[lumina]
# address that lumen will listen on for IDA to connect to
bind_addr = "0.0.0.0:1234"
# indicates if TLS should be used for connections, if true the `lumina.tls` section is required.
use_tls = false
# server display name; appears in IDA output window
server_name = "lumen"

# Allow clients to delete metadata from the database?
allow_deletes = false
# How many function histories should we return? 0=Disabled.
get_history_limit = 50

# only required when `use_tls` is set to true.
[lumina.tls]
# Specify the server's certificate.
# Clients connecting to the server must match this certificate.
# If the certificate is password protected, the password can be specified in the `PKCSPASSWD` environment variable.
server_cert = "path/to/server_crt"

[ignore]
# Ignore function comment, such as : Microsoft VisualC v14 64bit runtime
fcomment = []
# Ignore btye comment such as:
bcomment = []
# Ignore extra comment such as: Trap to Debugger
ecomment = []

[database]
# Path to the single-file Turso (libSQL / SQLite-compatible) database.
# The file (and parent directories) will be created automatically on first run,
# and the schema will be initialized with no extra steps required.
path = "lumen.db"

# comment out this section to disable api server
# api server allows to query the database for comments by file or function hash.
[api_server]
bind_addr = "0.0.0.0:8082"
# Set to true to require HTTP Basic Auth for the web API.
# Users and hashed passwords are stored in the `web_users` database table.
# Create or update a regular user with:
# lumen -c config.toml user create <username> <password>
# The reserved guest username accepts any password and is read-only.
require_auth = false
